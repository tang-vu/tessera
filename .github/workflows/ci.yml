name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contracts (forge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Build
        working-directory: contracts
        run: forge build --sizes
      - name: Test
        working-directory: contracts
        run: forge test -vvv

  apps:
    name: Apps (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Agent typecheck
        run: pnpm --filter @tessera/agent typecheck
      - name: Web typecheck
        run: pnpm --filter @tessera/web typecheck
      - name: Web build
        run: pnpm --filter @tessera/web build
